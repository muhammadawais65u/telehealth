<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <!-- Yellow butterfly icon -->
  <g transform="translate(10, 8)">
    <!-- Left wing -->
    <path d="M20 32 C10 20, 2 10, 8 4 C14 -2, 24 4, 28 16 Z" fill="#FFD100"/>
    <!-- Right wing -->
    <path d="M28 16 C32 4, 42 -2, 48 4 C54 10, 46 20, 36 32 Z" fill="#FFD100"/>
    <!-- Lower left wing -->
    <path d="M20 32 C10 40, 6 50, 14 54 C22 58, 28 48, 28 38 Z" fill="#FFD100"/>
    <!-- Lower right wing -->
    <path d="M36 32 C46 40, 50 50, 42 54 C34 58, 28 48, 28 38 Z" fill="#FFD100"/>
    <!-- Body -->
    <ellipse cx="28" cy="32" rx="2.5" ry="14" fill="#333"/>
    <!-- Antennae -->
    <path d="M26 20 C22 14, 18 12, 16 10" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M30 20 C34 14, 38 12, 40 10" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- FreeStyle text -->
  <text x="68" y="30" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#333" letter-spacing="0.5">FreeStyle</text>
  <!-- Libre text -->
  <text x="68" y="56" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#333" letter-spacing="-0.5">Libre</text>
</svg>
